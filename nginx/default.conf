server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Next.js application
    location / {
        proxy_pass http://nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for streaming/SSR
        proxy_buffering off;
    }

    # Supabase reverse proxy
    location /supabase/ {
        # Strip /supabase prefix before forwarding
        rewrite ^/supabase/(.*) /$1 break;

        proxy_pass https://xcfejvtzgtnsvedjzqll.supabase.co;
        proxy_http_version 1.1;
        proxy_set_header Host xcfejvtzgtnsvedjzqll.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSL SNI support (required for Cloudflare)
        proxy_ssl_server_name on;
        proxy_ssl_name xcfejvtzgtnsvedjzqll.supabase.co;

        # WebSocket support (for Supabase Realtime)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Increase timeouts for long-polling
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
